<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Shield/rounded square background -->
  <rect x="2" y="2" width="28" height="28" rx="6" ry="6" fill="#0f0a1a" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Inner border accent -->
  <rect x="4.5" y="4.5" width="23" height="23" rx="4" ry="4" fill="none" stroke="#1a1128" stroke-width="1"/>

  <!-- Four player circles in diamond pattern (Commander pod) -->
  <!-- Top -->
  <circle cx="16" cy="9" r="2.8" fill="#1a1128" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Right -->
  <circle cx="23" cy="16" r="2.8" fill="#1a1128" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Bottom -->
  <circle cx="16" cy="23" r="2.8" fill="#1a1128" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Left -->
  <circle cx="9" cy="16" r="2.8" fill="#1a1128" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Connecting lines between players (pod connections) -->
  <line x1="16" y1="11.8" x2="20.2" y2="16" stroke="#fbbf24" stroke-width="0.7" opacity="0.5"/>
  <line x1="20.2" y1="16" x2="16" y2="20.2" stroke="#fbbf24" stroke-width="0.7" opacity="0.5"/>
  <line x1="16" y1="20.2" x2="11.8" y2="16" stroke="#fbbf24" stroke-width="0.7" opacity="0.5"/>
  <line x1="11.8" y1="16" x2="16" y2="11.8" stroke="#fbbf24" stroke-width="0.7" opacity="0.5"/>
</svg>
